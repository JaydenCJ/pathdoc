<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="610" viewBox="0 0 1020 610" font-family="Menlo, Consolas, monospace" font-size="12" xml:space="preserve">
  <rect width="1020" height="610" rx="10" fill="#101418"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="22" r="6" fill="#27c93f"/>
  <text x="510" y="27" fill="#8b949e" text-anchor="middle" font-size="12">pathdoc — which python is running, and who put it there?</text>
  <g fill="#c9d1d9">
    <text x="24" y="56"><tspan fill="#7ee787">$</tspan> pathdoc report</text>
    <text x="24" y="80"><tspan fill="#79c0ff">pathdoc report</tspan> — 6 entries · 3 clean · 3 issue(s) · 2 shadowing conflict(s) (1 benign)</text>
    <text x="24" y="98" fill="#8b949e">provenance: 1 rc file(s) scanned · 2 PATH-modifying line(s)</text>
    <text x="24" y="124" fill="#d2a8ff"> #  entry           status               provenance</text>
    <text x="24" y="142"> 1  <tspan fill="#7ee787">~/.pyenv/shims</tspan>  ok                   <tspan fill="#79c0ff">~/.zshrc:1 · pyenv hook</tspan></text>
    <text x="24" y="160"> 2  <tspan fill="#7ee787">/usr/local/bin</tspan>  ok                   <tspan fill="#79c0ff">~/.zshrc:2</tspan></text>
    <text x="24" y="178"> 3  <tspan fill="#7ee787">/usr/bin</tspan>        ok                   <tspan fill="#8b949e">(inherited — no rc line found)</tspan></text>
    <text x="24" y="196"> 4  <tspan fill="#7ee787">/usr/local/bin</tspan>  <tspan fill="#ffbd2e">duplicate of #2</tspan>      <tspan fill="#79c0ff">~/.zshrc:2</tspan></text>
    <text x="24" y="214"> 5  <tspan fill="#7ee787">/opt/old/bin</tspan>    <tspan fill="#ffbd2e">does not exist</tspan>       <tspan fill="#8b949e">(inherited — no rc line found)</tspan></text>
    <text x="24" y="232"> 6  <tspan fill="#7ee787">(empty)</tspan>         <tspan fill="#ff7b72">empty = current dir</tspan>  <tspan fill="#8b949e">—</tspan></text>
    <text x="24" y="258" fill="#d2a8ff">issues</text>
    <text x="24" y="276">  [<tspan fill="#ffbd2e">warn</tspan> ] entry 4 (/usr/local/bin) duplicates entry 2 and is never consulted</text>
    <text x="24" y="294">  [<tspan fill="#ffbd2e">warn</tspan> ] entry 5 (/opt/old/bin) does not exist</text>
    <text x="24" y="312">  [<tspan fill="#ff7b72">error</tspan>] entry 6 is empty — the shell treats an empty segment as the current directory, so any file in $PWD named like a command wins</text>
    <text x="24" y="338" fill="#d2a8ff">shadowing</text>
    <text x="24" y="356">  node     <tspan fill="#7ee787">/usr/local/bin/node</tspan> wins · 1 shadowed · <tspan fill="#8b949e">same file — benign</tspan></text>
    <text x="24" y="374">  python3  <tspan fill="#7ee787">~/.pyenv/shims/python3</tspan> wins · 2 shadowed · <tspan fill="#f778ba">2 different file(s)</tspan></text>
    <text x="24" y="400" fill="#8b949e">run `pathdoc which &lt;command&gt;` to see every candidate with provenance.</text>
    <text x="24" y="436"><tspan fill="#7ee787">$</tspan> pathdoc which python3</text>
    <text x="24" y="460">python3 — 3 candidate(s) on PATH, first wins</text>
    <text x="24" y="486">  <tspan fill="#f778ba">►</tspan> <tspan fill="#7ee787">~/.pyenv/shims/python3</tspan>    (wins)</text>
    <text x="24" y="504" fill="#8b949e">      entry 1 · added by <tspan fill="#79c0ff">~/.zshrc:1 · pyenv hook</tspan></text>
    <text x="24" y="522">    /usr/local/bin/python3    <tspan fill="#ffbd2e">(shadowed — different file)</tspan></text>
    <text x="24" y="540" fill="#8b949e">      entry 2 · added by <tspan fill="#79c0ff">~/.zshrc:2</tspan></text>
    <text x="24" y="558">    /usr/bin/python3    <tspan fill="#ffbd2e">(shadowed — different file)</tspan></text>
    <text x="24" y="576" fill="#8b949e">      entry 3 · no rc line claims this entry (inherited)</text>
  </g>
</svg>
